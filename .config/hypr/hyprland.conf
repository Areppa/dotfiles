# Hyprland Configuration
# https://wiki.hypr.land/Configuring/

# ==================
# MONITOR CONFIG
# ==================
# monitor = eDP-2, 2560x1600@239.998993, 2560x0, 1, vrr, 1
monitor = , preferred,auto,auto

# ==================
# OTHER CONFIGS
# ==================
source = ./dms/colors.conf
source = ./dms/outputs.conf
source = ./dms/layout.conf
source = ./dms/cursor.conf
source = ./dms/binds.conf
source = ./dms/windowrules.conf
source = ./dms/gestures.conf

# ==================
# STARTUP APPS
# ==================
exec-once = dbus-update-activation-environment --systemd --all
exec-once = systemctl --user start hyprland-session.target

# Essentials
#exec-once = waybar & swaync & hypridle & hyprpaper

# Autostart specific apps in specific workspaces
exec-once = ~/.config/scripts/startup.sh

# Background apps
#exec-once = flatpak run org.openrgb.OpenRGB --startminimized
exec-once = flatpak run com.github.wwmm.easyeffects -w
exec-once = steam -silent -console
exec-once = udiskie

# Visible apps
exec-once = [workspace 5 silent] $browser
exec-once = [workspace 2 silent] spotify
exec-once = [workspace 2 silent] flatpak run dev.vencord.Vesktop
exec-once = [workspace 3 silent] flatpak run md.obsidian.Obsidian
exec-once = [workspace 2 silent] flatpak run com.super_productivity.SuperProductivity

# ==================
# INPUT CONFIG
# ==================
input {
    kb_layout = fi
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    sensitivity = -0.2 # -1.0 - 1.0, 0 means no modification.
    accel_profile = flat

    numlock_by_default = true

    touchpad {
        natural_scroll = true
    }
}

# ==================
# GENERAL LAYOUT
# ==================
general {
    gaps_in = 5
    gaps_out = 5
    border_size = 2

    layout = dwindle
}

# ==================
# DECORATION
# ==================
decoration {
    rounding = 12

    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = true
        range = 30
        render_power = 5
        offset = 0 5
        color = rgba(00000070)
    }
}

# ==================
# ANIMATIONS
# ==================
animations {
    enabled = true

    animation = windowsIn, 1, 3, default
    animation = windowsOut, 1, 3, default
    animation = workspaces, 1, 5, default
    animation = windowsMove, 1, 4, default
    animation = fade, 1, 3, default
    animation = border, 1, 3, default
}

# ==================
# LAYOUTS
# ==================
dwindle {
    preserve_split = true
}

master {
    mfact = 0.5
}

# ==================
# MISC
# ==================
misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
}

# ==================
# PERMISSIONS
# ==================
permission = /usr/(bin|local/bin)/grim, screencopy, allow
permission = /usr/(lib|libexec|lib64)/xdg-desktop-portal-hyprland, screencopy, allow
permission = /usr/(bin|local/bin)/hyprpm, plugin, allow

# BACKGROUND
background {
    monitor =
    path = ~/.config/backgrounds/shaded.png
    blur_passes = 1
    blur_size = 0
    brightness = 0.8
    contrast = 1
    vibrancy_darkness = 1
}

# GENERAL
general {
    hide_cursor = true
    ignore_empty_input = true
    no_fade_in = false
    grace = 0
    disable_loading_bar = false
    enable_fingerprint = true
}

# Time
label {
    monitor =
    text = cmd[update:1000] echo "<span>$(date +"%I:%M")</span>"
    color = rgba(76, 76, 76, 0.79)
    font_size = 60
    font_family = SF Pro Display Bold
    position = 30, 80
    halign = center
    valign = center
}

# Day-Month-Date
label {
    monitor =
    text = cmd[update:1000] echo -e "$(date +"%A, %B %d")"
    align = center
    color = rgba(49, 49, 49, 0.8)
    font_size = 19
    font_family = SF Pro Display Bold
    position = 35, 20
    halign = center
    valign = center
}

# Day-Month-Date
label {
    monitor =
    text = cmd[update:1000] echo -e "$ATTEMPTS[] $PAMFAIL"
    align = center
    color = rgba(49, 49, 49, 0.8)
    font_size = 15
    font_family = SF Pro Display Bold
    position = 35, -20
    halign = center
    valign = center
}

# INPUT FIELD
input-field {
    monitor =
    size = 320, 55
    outline_thickness = 0
    dots_size = 0.2 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.2 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    color = rgba(0, 0, 0, 0.8)
    inner_color = rgba(0, 0, 0, 0.8)
    font_color = rgb(200, 200, 200)
    fade_on_empty = false
    font_family = SF Pro Display Bold
    placeholder_text = <span foreground="##ffffff99">🔒</span>
    hide_input = false
    position = 34, -100
    halign = center
    valign = center
    rounding = 10
}

# Battery
label {
    monitor =
    text = cmd[update:1000] echo -e $(~/.config/hypr/scripts/battery.sh)
    color = rgba(200, 200, 200, 0.5)
    font_size = 12
    font_family = JetBrains Mono Nerd Font Mono ExtraBold
    position = -30, -510
    halign = right
    valign = center
    zindex = 5
}

# Battery div
shape {
    monitor =
    size = 70, 35
    color = $primary_7_rgba
    rounding = 10
    rotate = 0
    position = 905, 12
    halign = center
    valign = bottom
    zindex = 1
}

# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
# See https://wiki.hyprland.org/Configuring/Workspace-Rules/ for workspace rules

# Example windowrule
# windowrule = float,class:^(kitty)$,title:^(kitty)$

# Configure workspaces to monitors:
workspace = 1, persistent:true, default:true
workspace = 2, persistent:true
workspace = 3, persistent:true
workspace = 4, persistent:true
workspace = 5, persistent:true

workspace = 1, monitor:DVI-D-1
workspace = 2, monitor:DVI-D-1
workspace = 3, monitor:DVI-D-1
workspace = 4, monitor:DVI-D-1
workspace = 5, monitor:DP-2

# Window workspace assignments
windowrule = match:class spotify, workspace 2
windowrule = match:class vesktop, workspace 2

# Rules for specific apps
windowrule {
    name = Calculator
    match:class = org.gnome.Calculator
    size = 500 620
    float = true
}

windowrule {
    name = pavucontrol
    match:class = org.pulseaudio.pavucontrol
    size = 1000 900
    min_size = 450 700
    float = true
}

windowrule {
    name = Anki
    match:class = net.ankiweb.Anki
    size = 800 950
    min_size = 750 650
    float = true
    workspace = 10
}

windowrule {
    name = Steam Games
    match:class = ^steam_app_\d+$
    workspace = 10
    fullscreen = true
}

windowrule {
    name = Minecraft (and modded)
    match:class = DeceasedCraft
    workspace = 10
    fullscreen = true
}

#windowrule = workspace 10, class:steam_app_.*

# BLUR & FULLSCREEN
#windowrulev2 = noblur, tag:games*
#windowrulev2 = fullscreen, tag:games*

# DEFAULT RULES BY DMS
windowrule = float on, match:class ^(xdg-desktop-portal)$

windowrule = no_initial_focus on, match:class ^(steam)$, match:title ^(notificationtoasts)
windowrule = pin on, match:class ^(steam)$, match:title ^(notificationtoasts)

windowrule = float on, match:class ^(firefox)$, match:title ^(Picture-in-Picture)$
windowrule = float on, match:class ^(zoom)$

# DMS windows floating by default
# ! Hyprland doesn't size these windows correctly so disabling by default here
# windowrule = float on, match:class ^(org.quickshell)$

layerrule = no_anim on, match:namespace ^(quickshell)$
layerrule = no_anim on, match:namespace ^dms:.*